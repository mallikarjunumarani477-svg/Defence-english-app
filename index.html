<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defence English Mastery - NDA, CDS, AFCAT</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .military-card { transition: transform 0.2s; }
        .military-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <!-- Fallback while loading -->
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <p class="text-lg font-bold text-slate-800 animate-pulse">Loading Mission... 🇮🇳</p>
                <p class="text-xs text-slate-400 mt-2">Please wait a moment.</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState } = React;

        // Custom Icon Component (Simple SVG to avoid external loading issues)
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                shield: <path d="M12 2L3 7v9c0 5 9 10 9 10s9-5 9-10V7l-9-5z" />,
                target: <circle cx="12" cy="12" r="10" /><path d="M12 8v8M8 12h8" />,
                book: <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5v14z" />,
                brain: <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1 0-4.88 2.5 2.5 0 0 1 0-4.88A2.5 2.5 0 0 1 9.5 2zM14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 0-4.88 2.5 2.5 0 0 0 0-4.88A2.5 2.5 0 0 0 14.5 2z" />,
                arrow: <path d="M5 12h14M12 5l7 7-7 7" />,
                award: <circle cx="12" cy="8" r="7" /><path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.11" />,
                history: <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            };
            return (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [quizStarted, setQuizStarted] = useState(false);
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const pyqData = [
                {
                    exam: "CDS II 2023",
                    topic: "Spotting Errors",
                    question: "Neither of the two (A)/ brothers were (B)/ selected for the job (C)/ No Error (D).",
                    answer: "B",
                    explanation: "'Neither' is always singular, so 'were' should be replaced by 'was'."
                },
                {
                    exam: "NDA I 2024",
                    topic: "Synonyms",
                    question: "The teacher's advice was very VALUABLE.",
                    options: ["Cheap", "Precious", "Useless", "Common"],
                    answer: "Precious",
                    explanation: "Valuable means something of great worth, which is synonymous with 'Precious'."
                }
            ];

            const quizQuestions = [
                { q: "Synonym of 'ABANDON':", options: ["Keep", "Discard", "Accept", "Follow"], ans: "Discard", hint: "To leave permanently." },
                { q: "The news ______ not true.", options: ["are", "were", "is", "be"], ans: "is", hint: "'News' is always singular." }
            ];

            const handleQuizAnswer = (opt) => {
                if (opt === quizQuestions[currentQuestion].ans) setScore(score + 1);
                if (currentQuestion + 1 < quizQuestions.length) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    setShowResult(true);
                }
            };

            const NavItem = ({ id, label }) => (
                <button 
                    onClick={() => { setActiveTab(id); setIsMenuOpen(false); }}
                    className={`uppercase text-xs font-black tracking-widest px-2 py-1 transition-all ${activeTab === id ? 'text-red-600 border-b-2 border-red-600' : 'text-slate-400 hover:text-slate-100'}`}
                >
                    {label}
                </button>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <nav className="bg-slate-900 text-white sticky top-0 z-50 shadow-2xl border-b border-slate-800">
                        <div className="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-red-600 rounded-lg">
                                    <Icon name="shield" className="w-5 h-5 text-white" />
                                </div>
                                <div className="leading-none">
                                    <h1 className="text-lg font-black tracking-tighter">DEFENCE MASTERY</h1>
                                    <p className="text-[9px] text-slate-500 font-bold uppercase tracking-[0.2em]">NDA • CDS • AFCAT</p>
                                </div>
                            </div>
                            
                            <div className="hidden md:flex gap-6">
                                <NavItem id="home" label="Home" />
                                <NavItem id="grammar" label="Grammar" />
                                <NavItem id="pyq" label="PYQs" />
                                <NavItem id="quiz" label="Quiz" />
                            </div>

                            <button className="md:hidden text-slate-400" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                            </button>
                        </div>

                        {/* Mobile Menu */}
                        {isMenuOpen && (
                            <div className="md:hidden bg-slate-800 p-4 flex flex-col gap-4 border-t border-slate-700">
                                <button onClick={() => {setActiveTab('home'); setIsMenuOpen(false);}} className="text-left font-bold py-2 border-b border-slate-700">HOME</button>
                                <button onClick={() => {setActiveTab('grammar'); setIsMenuOpen(false);}} className="text-left font-bold py-2 border-b border-slate-700">GRAMMAR</button>
                                <button onClick={() => {setActiveTab('pyq'); setIsMenuOpen(false);}} className="text-left font-bold py-2 border-b border-slate-700">PYQs</button>
                                <button onClick={() => {setActiveTab('quiz'); setIsMenuOpen(false);}} className="text-left font-bold py-2">QUIZ</button>
                            </div>
                        )}
                    </nav>

                    <main className="flex-grow max-w-5xl mx-auto w-full px-4 py-8">
                        {activeTab === 'home' && (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="bg-slate-900 rounded-[2rem] p-8 sm:p-12 text-white relative overflow-hidden shadow-2xl border border-slate-800">
                                    <div className="relative z-10">
                                        <h2 className="text-4xl font-black mb-4 leading-tight">Master English for <br/><span className="text-red-600 underline decoration-4">Defence Exams.</span></h2>
                                        <p className="text-slate-400 mb-8 max-w-md">संपूर्ण भारतातील NDA, CDS, आणि AFCAT उमेदवारांसाठी मोफत तयारी प्लॅटफॉर्म.</p>
                                        <button onClick={() => setActiveTab('pyq')} className="bg-red-600 hover:bg-red-700 text-white font-bold px-8 py-4 rounded-2xl flex items-center gap-3 transition shadow-lg active:scale-95">
                                            Start Mission <Icon name="arrow" className="w-5 h-5" />
                                        </button>
                                    </div>
                                    <div className="absolute top-0 right-0 opacity-5 -mr-20 -mt-20">
                                        <Icon name="shield" className="w-96 h-96" />
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm military-card" onClick={() => setActiveTab('pyq')}>
                                        <Icon name="history" className="text-red-600 mb-4" />
                                        <h3 className="font-black text-slate-800">Year-wise PYQs</h3>
                                        <p className="text-slate-500 text-sm mt-1">मागील वर्षांचे प्रश्न उत्तरासह.</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm military-card" onClick={() => setActiveTab('grammar')}>
                                        <Icon name="book" className="text-red-600 mb-4" />
                                        <h3 className="font-black text-slate-800">Grammar Rules</h3>
                                        <p className="text-slate-500 text-sm mt-1">शून्यपासून प्रगत व्याकरणाचे नियम.</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm military-card" onClick={() => setActiveTab('quiz')}>
                                        <Icon name="brain" className="text-red-600 mb-4" />
                                        <h3 className="font-black text-slate-800">Daily Drills</h3>
                                        <p className="text-slate-500 text-sm mt-1">स्वतःची क्षमता दररोज तपासा.</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'pyq' && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tighter border-l-4 border-red-600 pl-4">Previous Year Questions</h2>
                                {pyqData.map((item, idx) => (
                                    <div key={idx} className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                                        <div className="flex justify-between items-center mb-4 pb-2 border-b">
                                            <span className="text-[10px] font-black bg-red-100 text-red-600 px-2 py-1 rounded">{item.exam}</span>
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{item.topic}</span>
                                        </div>
                                        <p className="text-lg font-bold text-slate-800 mb-4">{item.question}</p>
                                        {item.options && (
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                                                {item.options.map((opt, i) => (
                                                    <div key={i} className="p-3 bg-slate-50 border rounded-xl text-sm font-medium text-slate-600">{opt}</div>
                                                ))}
                                            </div>
                                        )}
                                        <div className="p-4 bg-emerald-50 rounded-xl border border-emerald-100">
                                            <p className="text-sm font-black text-emerald-800">Answer: {item.answer}</p>
                                            <p className="text-xs text-emerald-700 mt-1"><strong>Explain:</strong> {item.explanation}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'quiz' && (
                            <div className="flex justify-center animate-in zoom-in-95 duration-300">
                                {!quizStarted ? (
                                    <div className="bg-white p-12 rounded-[2.5rem] shadow-xl border border-slate-200 text-center max-w-sm w-full">
                                        <div className="w-16 h-16 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                            <Icon name="brain" className="w-8 h-8" />
                                        </div>
                                        <h2 className="text-2xl font-black text-slate-800 mb-2">Practice Mission</h2>
                                        <p className="text-slate-400 text-sm mb-8">Ready to test your knowledge?</p>
                                        <button onClick={() => setQuizStarted(true)} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">Engage Now</button>
                                    </div>
                                ) : showResult ? (
                                    <div className="bg-white p-12 rounded-[2.5rem] shadow-xl text-center max-w-sm w-full border border-slate-200">
                                        <div className="text-yellow-500 mb-6">
                                            <Icon name="award" className="w-20 h-20 mx-auto" />
                                        </div>
                                        <h2 className="text-2xl font-black text-slate-800">Mission Report</h2>
                                        <p className="text-6xl font-black text-red-600 my-8">{score} / {quizQuestions.length}</p>
                                        <button onClick={() => {setQuizStarted(false); setShowResult(false); setScore(0); setCurrentQuestion(0);}} className="w-full bg-slate-100 text-slate-700 py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                                            <Icon name="history" className="w-5 h-5" /> Re-drill
                                        </button>
                                    </div>
                                ) : (
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200 max-w-xl w-full">
                                        <p className="text-[10px] font-black text-red-600 mb-2 uppercase tracking-widest">Question {currentQuestion + 1} of {quizQuestions.length}</p>
                                        <h3 className="text-2xl font-black text-slate-800 mb-8">{quizQuestions[currentQuestion].q}</h3>
                                        <div className="space-y-3 mb-8">
                                            {quizQuestions[currentQuestion].options.map((opt, i) => (
                                                <button key={i} onClick={() => handleQuizAnswer(opt)} className="w-full text-left p-5 rounded-2xl border-2 border-slate-100 hover:border-red-500 hover:bg-red-50 font-bold text-slate-700 transition active:scale-95">{opt}</button>
                                            ))}
                                        </div>
                                        <div className="p-4 bg-amber-50 rounded-2xl border border-amber-100 text-amber-800 text-sm italic">
                                            <strong>Hint:</strong> {quizQuestions[currentQuestion].hint}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="bg-white border-t border-slate-200 py-6 text-center">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Jai Hind 🇮🇳 • Operational Unit: Online</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
```
