<!DOCTYPE html>

</head>
<body class="bg-slate-50">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <p class="text-xl font-black text-slate-800 animate-pulse">DEPLOYING MISSION... 🇮🇳</p>
                <p class="text-xs text-slate-400 mt-2 font-bold uppercase tracking-widest">Jai Hind Aspirant</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState } = React;

        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                shield: <path d="M12 2L3 7v9c0 5 9 10 9 10s9-5 9-10V7l-9-5z" />,
                target: <circle cx="12" cy="12" r="10" /><path d="M12 8v8M8 12h8" />,

                brain: <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1 0-4.88 2.5 2.5 0 0 1 0-4.88A2.5 2.5 0 0 1 9.5 2zM14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 0-4.88 2.5 2.5 0 0 0 0-4.88A2.5 2.5 0 0 0 14.5 2z" />,
                arrow: <path d="M5 12h14M12 5l7 7-7 7" />,
                award: <circle cx="12" cy="8" r="7" /><path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.11" />,
                history: <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />,
                share: <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13" />,
                whatsapp: <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.414 0 .004 5.412.004 12.049c0 2.12.554 4.189 1.605 6.02L0 24l6.132-1.61a11.806 11.806 0 005.918 1.583h.005c6.635 0 12.045-5.412 12.045-12.049 0-3.216-1.252-6.24-3.526-8.514z" />
            };
            return (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [quizStarted, setQuizStarted] = useState(false);
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const pyqData = [
                { exam: "CDS II 2023", topic: "Spotting Errors", question: "Neither of the two (A)/ brothers were (B)/ selected for the job (C)/ No Error (D).", answer: "B", explanation: "'Neither' is always singular, so 'were' should be replaced by 'was'." },
                { exam: "NDA I 2024", topic: "Synonyms", question: "The teacher's advice was very VALUABLE.", options: ["Cheap", "Precious", "Useless", "Common"], answer: "Precious", explanation: "Valuable means something of great worth, which is synonymous with 'Precious'." },
                { exam: "AFCAT 2023", topic: "Idioms", question: "To be 'Under the weather' means:", options: ["To be happy", "To feel sick", "To enjoy rain", "To be rich"], answer: "To feel sick", explanation: "This idiom is used when someone is feeling slightly ill." },
                { exam: "CDS I 2024", topic: "Prepositions", question: "He is superior ______ all his colleagues.", options: ["than", "to", "from", "over"], answer: "to", explanation: "Words ending in -ior (superior, junior, senior) take the preposition 'to'." },
                { exam: "NDA II 2023", topic: "Tenses", question: "If I ______ a king, I would help the poor.", options: ["am", "was", "were", "had been"], answer: "were", explanation: "In imaginary/hypothetical sentences, 'were' is used for all subjects." }
            ];

            const grammarModules = [
                { title: "Basic Parts of Speech", rules: ["Noun: Names of people, objects, places.", "Pronoun: Used instead of a noun (I, You, He, She, They).", "Adjective: Describes a noun (Brave soldier).", "Adverb: Describes an action (Fought courageously)."] },
                { title: "Subject-Verb Agreement", rules: ["Singular subject = Singular verb.", "Words like 'Each', 'Every', 'Neither' are ALWAYS singular.", "With 'Along with', verb follows the FIRST subject."] },
                { title: "Articles (A, An, The)", rules: ["Use 'An' before vowel SOUNDS (An honest man).", "Use 'A' before consonant SOUNDS (A university).", "Use 'The' for specific or unique things (The Sun)."] }
            ];

            const quizQuestions = [
                { q: "Synonym of 'ABANDON':", options: ["Keep", "Discard", "Accept", "Follow"], ans: "Discard", hint: "To leave permanently." },
                { q: "The news ______ not true.", options: ["are", "were", "is", "be"], ans: "is", hint: "'News' is always singular." },
                { q: "I prefer tea ______ coffee.", options: ["than", "to", "over", "with"], ans: "to", hint: "Words like prefer take 'to'." },
                { q: "He has been here ______ Monday.", options: ["for", "from", "since", "during"], ans: "since", hint: "Used for a specific point in time." }
            ];

            const shareApp = () => {
                const text = "Jai Hind! 🇮🇳 Check out this Defence English Mastery App for NDA, CDS, AFCAT aspirants: https://mallikarjunumarani477-svg.github.io/Defence-english-app/";
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            };

            const handleQuizAnswer = (opt) => {
                if (opt === quizQuestions[currentQuestion].ans) setScore(score + 1);
                if (currentQuestion + 1 < quizQuestions.length) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    setShowResult(true);
                }
            };

            const NavBtn = ({ id, label, icon }) => (
                <button 
                    onClick={() => { setActiveTab(id); setIsMenuOpen(false); window.scrollTo(0,0); }}
                    className={`flex items-center gap-2 px-4 py-2 rounded-xl transition-all font-bold text-xs uppercase tracking-widest ${activeTab === id ? 'bg-red-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`}
                >
                    <Icon name={icon} className="w-4 h-4" />
                    <span className="hidden sm:inline">{label}</span>
                </button>
            );

            return (
                <div className="min-h-screen flex flex-col selection:bg-red-500 selection:text-white">
                    {/* Header */}
                    <nav className="glass sticky top-0 z-50 border-b border-slate-200">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-slate-900 p-2 rounded-lg shadow-lg">
                                    <Icon name="shield" className="w-6 h-6 text-red-600" />
                                </div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-900 tracking-tighter">DEFENCE MASTER</h1>
                                    <p className="text-[9px] text-slate-500 font-bold tracking-[0.3em] uppercase">Jai Hind Platform</p>
                                </div>
                            </div>
                            
                            <div className="hidden md:flex gap-2">
                                <NavBtn id="home" label="Home" icon="shield" />
                                <NavBtn id="pyq" label="PYQs" icon="history" />
                                <NavBtn id="grammar" label="Grammar" icon="book" />
                                <NavBtn id="quiz" label="Quiz" icon="brain" />
                            </div>

                            <div className="flex gap-2">
                                <button onClick={shareApp} className="bg-emerald-500 hover:bg-emerald-600 text-white p-2.5 rounded-xl shadow-md transition">
                                    <Icon name="whatsapp" className="w-5 h-5 fill-white" />
                                </button>
                                <button className="md:hidden bg-slate-100 p-2.5 rounded-xl" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                    <Icon name={isMenuOpen ? "history" : "shield"} className="w-5 h-5 text-slate-600" />
                                </button>
                            </div>
                        </div>

                        {isMenuOpen && (
                            <div className="md:hidden bg-white border-t p-4 grid grid-cols-2 gap-2 animate-in slide-in-from-top-2 duration-200">
                                <button onClick={()=>{setActiveTab('home'); setIsMenuOpen(false);}} className="p-4 bg-slate-50 rounded-xl font-bold text-xs text-slate-600">HOME</button>
                                <button onClick={()=>{setActiveTab('pyq'); setIsMenuOpen(false);}} className="p-4 bg-slate-50 rounded-xl font-bold text-xs text-slate-600">PYQs</button>
                                <button onClick={()=>{setActiveTab('grammar'); setIsMenuOpen(false);}} className="p-4 bg-slate-50 rounded-xl font-bold text-xs text-slate-600">GRAMMAR</button>
                                <button onClick={()=>{setActiveTab('quiz'); setIsMenuOpen(false);}} className="p-4 bg-slate-50 rounded-xl font-bold text-xs text-slate-600">QUIZ</button>
                            </div>
                        )}
                    </nav>

                    <main className="flex-grow max-w-5xl mx-auto w-full px-4 py-8">
                        {activeTab === 'home' && (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="bg-slate-900 rounded-[2.5rem] p-10 text-white relative overflow-hidden shadow-2xl">
                                    <div className="relative z-10">
                                        <span className="bg-red-600 text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-widest mb-4 inline-block">India's Aspirant Hub</span>
                                        <h2 className="text-4xl sm:text-6xl font-black mb-4 leading-tight">Elevate Your <br/>Defence English.</h2>
                                        <p className="text-slate-400 mb-8 max-w-sm text-lg leading-relaxed">Dedicated to the uniform. Study PYQs, Grammar and practice for free.</p>
                                        <div className="flex flex-wrap gap-4">
                                            <button onClick={() => setActiveTab('pyq')} className="bg-red-600 hover:bg-red-700 text-white font-bold px-8 py-4 rounded-2xl flex items-center gap-3 transition shadow-xl active:scale-95">
                                                Explore PYQs <Icon name="arrow" className="w-5 h-5" />
                                            </button>
                                            <button onClick={shareApp} className="bg-white/10 hover:bg-white/20 text-white font-bold px-8 py-4 rounded-2xl flex items-center gap-3 transition border border-white/10">
                                                Share App <Icon name="share" className="w-5 h-5" />
                                            </button>
                                        </div>
                                    </div>
                                    <div className="absolute -bottom-20 -right-20 opacity-10 rotate-12">
                                        <Icon name="shield" className="w-[500px] h-[500px]" />
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 military-card" onClick={() => setActiveTab('pyq')}>
                                        <Icon name="history" className="text-red-600 mb-4" />
                                        <h3 className="font-black text-slate-800">PYQ Archive</h3>
                                        <p className="text-slate-500 text-xs mt-1">मागील वर्षांचे प्रश्न उत्तरासह.</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 military-card" onClick={() => setActiveTab('grammar')}>
                                        <Icon name="book" className="text-red-600 mb-4" />
                                        <h3 className="font-black text-slate-800">Grammar</h3>
                                        <p className="text-slate-500 text-xs mt-1">शून्यपासून प्रगत व्याकरणाचे नियम.</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 military-card" onClick={() => setActiveTab('quiz')}>
                                        <Icon name="brain" className="text-red-600 mb-4" />
                                        <h3 className="font-black text-slate-800">Practice Quiz</h3>
                                        <p className="text-slate-500 text-xs mt-1">तुमची दररोजची प्रगती तपासा.</p>
                                    </div>
                                    <div className="bg-emerald-50 p-6 rounded-2xl border border-emerald-100 military-card" onClick={shareApp}>
                                        <Icon name="whatsapp" className="text-emerald-600 mb-4" />
                                        <h3 className="font-black text-emerald-800">Support Aspirants</h3>
                                        <p className="text-emerald-600 text-xs mt-1">हा उपक्रम मित्रांना शेअर करा.</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'pyq' && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tighter border-l-4 border-red-600 pl-4 mb-8">Solved Previous Years</h2>
                                {pyqData.map((item, idx) => (
                                    <div key={idx} className="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm military-card">
                                        <div className="flex justify-between items-center mb-6">
                                            <span className="text-[10px] font-black bg-red-100 text-red-600 px-3 py-1 rounded-full uppercase">{item.exam}</span>
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{item.topic}</span>
                                        </div>
                                        <p className="text-xl font-bold text-slate-800 mb-6 leading-relaxed">{item.question}</p>
                                        {item.options && (
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">
                                                {item.options.map((opt, i) => (
                                                    <div key={i} className="p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold text-slate-600">{opt}</div>
                                                ))}
                                            </div>
                                        )}
                                        <div className="p-5 bg-emerald-50 rounded-2xl border border-emerald-100 shadow-inner">
                                            <p className="text-sm font-black text-emerald-800 mb-1">Answer: {item.answer}</p>
                                            <p className="text-xs text-emerald-700 leading-snug font-medium"><strong>Explain:</strong> {item.explanation}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'grammar' && (
                            <div className="space-y-8 animate-in fade-in duration-300">
                                <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tighter border-l-4 border-red-600 pl-4">English Grammar Guide</h2>
                                {grammarModules.map((mod, i) => (
                                    <div key={i} className="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                                        <div className="bg-slate-900 text-white px-8 py-5 font-black uppercase tracking-widest text-sm flex justify-between items-center">
                                            {mod.title}
                                            <Icon name="book" className="w-4 h-4 text-red-600" />
                                        </div>
                                        <div className="p-8 space-y-4">
                                            {mod.rules.map((rule, idx) => (
                                                <div key={idx} className="flex gap-4 p-5 bg-slate-50 rounded-2xl border border-slate-100 items-start">
                                                    <div className="bg-green-100 p-1 rounded-full"><Icon name="shield" className="w-3 h-3 text-green-600" /></div>
                                                    <p className="text-slate-700 text-sm font-bold">{rule}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
